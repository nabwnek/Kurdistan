name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'
    - run: |
        unzip Kurdistan-Keyboard-v2.zip
        cd Kurdistan
        gradle assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: Kurdistan-APK
        path: Kurdistan/app/build/outputs/apk/debug/app-debug.apk
