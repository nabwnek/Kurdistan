name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
    - name: Build APK
      run: |
        unzip Kurdistan-Keyboard-v4.zip
        cd Kurdistan2
        chmod +x gradlew 2>/dev/null || true
        gradle assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: Kurdistan-APK
        path: Kurdistan2/app/build/outputs/apk/debug/app-debug.apk
